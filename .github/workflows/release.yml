name: Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Test
        run: cargo test --release

  # Detect a version in the merged commit message, e.g.:
  #   "release v1.2.3"  /  "bump to 1.2.3"  /  "v1.2.3: port whitelist commands"
  detect-version:
    name: Detect release version
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from commit message
        id: extract
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          VERSION=$(echo "$COMMIT_MSG" | grep -oE 'v?[0-9]+\.[0-9]+\.[0-9]+' | head -n1 | sed 's/^v//') || true
          if [ -n "$VERSION" ]; then
            echo "Found version: $VERSION"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          else
            echo "No version found in commit message; skipping release."
          fi

  build-release:
    name: Build Release (${{ matrix.suffix }})
    needs: [check, detect-version]
    if: needs.detect-version.outputs.version != ''
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: linux-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            suffix: linux-arm64
          - os: macos-latest
            target: aarch64-apple-darwin
            suffix: macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            suffix: macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: windows-x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${{ needs.detect-version.outputs.version }}"
          ARCHIVE="evilmeme-v${VERSION}-${{ matrix.suffix }}.tar.gz"
          tar -czf "$ARCHIVE" -C "target/${{ matrix.target }}/release" evilmeme
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.detect-version.outputs.version }}"
          $archive = "evilmeme-v$version-${{ matrix.suffix }}.zip"
          Compress-Archive -Path "target/${{ matrix.target }}/release/evilmeme.exe" -DestinationPath $archive
          echo "ARCHIVE=$archive" >> $env:GITHUB_ENV

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.suffix }}
          path: ${{ env.ARCHIVE }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: [detect-version, build-release]
    if: needs.detect-version.outputs.version != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.detect-version.outputs.version }}
          name: v${{ needs.detect-version.outputs.version }}
          files: dist/*
          generate_release_notes: true
